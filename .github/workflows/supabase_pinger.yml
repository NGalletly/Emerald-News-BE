name: Supabase Keep Alive
on:
  schedule:
    # This runs every 3 days (well within the 7-day limit)
    - cron: "0 0 */3 * *"
  workflow_dispatch: # This adds a "Run now" button in GitHub so you can test it

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/articles?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
